<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Butler</title>
    <link rel="stylesheet" href="./index.css"/>
    <script src="./app.js" defer type="module"></script>
</head>
<body>
<div class="container">
    <aside id="sidebar">
        <div class="sidebar-grid">
            <div id="logo-container" class="padded">
                <img src="./images/butler.png" alt="logo">
                <div>
                    <p>Butler</p>
                    <small>Version 0.1 - 2/15/24</small>
                </div>
            </div>
            <div>
                <div class="border-b pad-b">
                    <p class="padded-x">Select a task to run</p>
                </div>
                <ul id="tasks-container" class="padded">
                    <li>
                        <button id="pdf_to_dir">PDF to Directory</button>
                    </li>
                </ul>
            </div>
            <div class="flex-col padded">
                <small>Created by Carlos Rodriguez</small>
                <small>
                    <a id="report-link" href="mailto:contact@crr.codes">Report issues</a>
                </small>
            </div>
        </div>
    </aside>
    <main id="main-container">
        <div id="main-welcome">
            <p>Butler is ready and on standby...</p>
            <p>Start by selecting a task from the menu on your left</p>
        </div>
    </main>
</div>
</body>
</html>
